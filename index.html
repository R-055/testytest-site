<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jump Mike</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --chrome-bg: #2d2a24;
    --chrome-text: #d4c9a8;
    --chrome-dim: #8b7355;
    --chrome-accent: #c0392b;
  }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--chrome-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: auto;
    user-select: none;
    -webkit-user-select: none;
  }

  .game-wrapper {
    position: relative;
    width: 100%;
    max-width: 800px;
    padding: 0 12px;
    max-height: 100vh;
    max-height: 100dvh;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 4px 4px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 15px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 400;
    color: var(--chrome-dim);
  }

  .score-group {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .header-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--chrome-text);
  }

  .header-hiscore {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--chrome-dim);
  }

  canvas {
    display: block;
    width: 100%;
    max-height: calc(100dvh - 60px);
    border-radius: 4px;
    touch-action: none;
    cursor: pointer;
    object-fit: contain;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    padding: 4px 4px 0;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--chrome-dim);
    flex-shrink: 0;
  }

  .footer-hint { font-style: italic; }
  .footer-speed {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <span class="header-title">Jump Mike</span>
    <div class="score-group">
      <span class="header-score" id="scoreDisplay">00000</span>
      <span class="header-hiscore" id="hiScoreDisplay">HI 00000</span>
    </div>
  </div>
  <canvas id="c"></canvas>
  <div class="footer">
    <span class="footer-hint" id="hintText">Space / Tap to jump &mdash; Down to duck</span>
    <span class="footer-speed" id="speedText"></span>
  </div>
</div>

<script>
// ---------------------------------------------------------------
//  SETUP
// ---------------------------------------------------------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreDisplay');
const hiScoreEl = document.getElementById('hiScoreDisplay');
const hintEl = document.getElementById('hintText');
const speedEl = document.getElementById('speedText');

let W = 800;
let H = 500;
canvas.width = W;
canvas.height = H;

let GROUND_Y = Math.floor(H * 0.8); // Running path at 20% up from bottom
const GRAVITY = 0.6;
const JUMP_VEL = -16;
const DUCK_GRAVITY = 1.4;

// Called when background.png loads to resize canvas to match image height
function resizeToBackground() {
  const natW = imgBg.naturalWidth;
  const natH = imgBg.naturalHeight;
  if (!natW || !natH) return;
  H = natH;
  canvas.height = H;
  GROUND_Y = Math.floor(H * 0.8);
  // Player may not be defined yet if bg loads very fast; guard it
  if (typeof player !== 'undefined') player.y = GROUND_Y;
}

// ---------------------------------------------------------------
//  IMAGE LOADING
// ---------------------------------------------------------------
//  Drop mike.png, obstacle.png, background.png alongside this file.
//  The game draws procedural fallbacks if images fail to load.

const imgMike = new Image();
const imgObstacle = new Image();
const imgBg = new Image();
const imgGift = new Image();

let mikeLoaded = false;
let obstacleLoaded = false;
let bgLoaded = false;
let giftLoaded = false;

imgMike.onload = () => { mikeLoaded = true; };
imgObstacle.onload = () => { obstacleLoaded = true; };
imgBg.onload = () => { bgLoaded = true; resizeToBackground(); };
imgGift.onload = () => { giftLoaded = true; };

imgMike.onerror = () => { mikeLoaded = false; };
imgObstacle.onerror = () => { obstacleLoaded = false; };
imgBg.onerror = () => { bgLoaded = false; };
imgGift.onerror = () => { giftLoaded = false; };

imgMike.src = './mike.png';
imgObstacle.src = './obstacle.png';
imgBg.src = './background.png';
imgGift.src = './gift-photo.jpg';

// ---------------------------------------------------------------
//  STATE
// ---------------------------------------------------------------
let gameState = 'idle'; // idle | running | dead
let score = 0;
let hiScore = parseInt(localStorage.getItem('jumpMikeHi') || '0', 10);
let frameCount = 0;
let speed = 5;
let obstacles = [];
let particles = [];
let clouds = [];
let groundOffset = 0;
let farGroundOffset = 0;
let flashTimer = 0;
let shakeTimer = 0;
let shakeX = 0;
let shakeY = 0;
let spawnCooldown = 0;
const MIN_SPAWN = 42;
const MAX_SPAWN = 115;

// ---------------------------------------------------------------
//  PLAYER
// ---------------------------------------------------------------
const player = {
  x: 80,
  y: GROUND_Y,
  w: 110,
  h: 120,
  dy: 0,
  onGround: true,
  ducking: false,
  duckH: 70,
  legPhase: 0,

  get drawH() { return this.ducking && this.onGround ? this.duckH : this.h; },
  get drawY() { return this.ducking && this.onGround ? GROUND_Y + (this.h - this.duckH) : this.y; },

  get hitbox() {
    const h = this.ducking ? this.duckH : this.h;
    const y = this.ducking ? GROUND_Y + (this.h - this.duckH) : this.y;
    return { x: this.x + 14, y: y + 10, w: this.w - 28, h: h - 14 };
  },

  jump() {
    if (this.onGround) {
      this.dy = JUMP_VEL;
      this.onGround = false;
      this.ducking = false;
      spawnDust(this.x + this.w / 2, GROUND_Y + this.h, 5);
    }
  },

  duck(state) {
    this.ducking = state;
    if (state && !this.onGround) this.dy = Math.max(this.dy, 5);
  },

  update() {
    const grav = this.ducking && !this.onGround ? DUCK_GRAVITY : GRAVITY;
    this.dy += grav;
    this.y += this.dy;
    if (this.y >= GROUND_Y) {
      if (!this.onGround) spawnDust(this.x + this.w / 2, GROUND_Y + this.h, 3);
      this.y = GROUND_Y;
      this.dy = 0;
      this.onGround = true;
    }
    if (this.onGround && gameState === 'running') this.legPhase += speed * 0.15;
  },

  draw() {
    if (mikeLoaded) {
      ctx.drawImage(imgMike, this.x, this.drawY, this.w, this.drawH);
      return;
    }
    // -- Procedural fallback --
    const dY = this.drawY;
    const dH = this.drawH;
    const duck = this.ducking && this.onGround;
    ctx.save();

    // Body
    ctx.fillStyle = '#4a5568';
    roundRect(this.x, dY, this.w, dH, duck ? 14 : 18); ctx.fill();

    // Belly
    ctx.fillStyle = '#718096';
    roundRect(this.x + 16, dY + (duck ? 14 : 32), this.w - 38, dH - (duck ? 24 : 52), 10); ctx.fill();

    // Eye
    const eyeX = this.x + this.w - 28;
    const eyeY = dY + (duck ? 16 : 24);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(eyeX, eyeY, 12, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a202c';
    ctx.beginPath(); ctx.arc(eyeX + 2, eyeY, 6, 0, Math.PI * 2); ctx.fill();

    // Legs
    if (!duck) {
      const legSpread = this.onGround ? Math.sin(this.legPhase) * 14 : 4;
      ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 10; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(this.x + 28, dY + dH); ctx.lineTo(this.x + 28 - legSpread, dY + dH + 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(this.x + 64, dY + dH); ctx.lineTo(this.x + 64 + legSpread, dY + dH + 20); ctx.stroke();
    }

    // Tail
    ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 8; ctx.lineCap = 'round';
    const tw = Math.sin(frameCount * 0.12) * 7;
    ctx.beginPath();
    ctx.moveTo(this.x + 4, dY + dH * 0.4);
    ctx.quadraticCurveTo(this.x - 28, dY + dH * 0.3 + tw, this.x - 42, dY + dH * 0.5 + tw);
    ctx.stroke();

    ctx.restore();
  }
};

// ---------------------------------------------------------------
//  OBSTACLES
// ---------------------------------------------------------------
function spawnObstacle() {
  // Obstacles sit with their base on the ground line
  // Player feet are at GROUND_Y + player.h
  const variants = ['single', 'double', 'tall'];
  const pick = variants[Math.floor(Math.random() * variants.length)];
  const feetY = GROUND_Y + player.h; // where feet touch ground

  let o;
  if (pick === 'single') {
    const h = 70;
    o = { x: W, y: feetY - h, w: 70, h: h, hitW: 54, hitH: 60 };
  } else if (pick === 'double') {
    const h = 75;
    o = { x: W, y: feetY - h, w: 120, h: h, hitW: 100, hitH: 64, double: true };
  } else {
    const h = 90;
    o = { x: W, y: feetY - h, w: 65, h: h, hitW: 50, hitH: 80 };
  }
  obstacles.push(o);
}

function drawObstacle(o) {
  if (obstacleLoaded) {
    ctx.drawImage(imgObstacle, o.x, o.y, o.w, o.h);
    return;
  }
  // -- Procedural fallback: cactus-style rocks --
  ctx.save();
  if (o.double) {
    ctx.fillStyle = '#6b5b45';
    roundRect(o.x, o.y + 10, 60, o.h - 10, 10); ctx.fill();
    roundRect(o.x + 70, o.y, 60, o.h, 10); ctx.fill();
    ctx.fillStyle = '#7a6a52';
    roundRect(o.x + 10, o.y + 24, 40, o.h - 40, 7); ctx.fill();
    roundRect(o.x + 80, o.y + 14, 40, o.h - 30, 7); ctx.fill();
  } else {
    ctx.fillStyle = '#6b5b45';
    roundRect(o.x, o.y, o.w, o.h, 12); ctx.fill();
    ctx.fillStyle = '#7a6a52';
    roundRect(o.x + 12, o.y + 14, o.w - 24, o.h - 34, 7); ctx.fill();
    // Spikes
    ctx.fillStyle = '#5a4a38';
    ctx.beginPath();
    ctx.moveTo(o.x + o.w * 0.3, o.y);
    ctx.lineTo(o.x + o.w * 0.3 - 7, o.y - 15);
    ctx.lineTo(o.x + o.w * 0.3 + 7, o.y - 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(o.x + o.w * 0.7, o.y);
    ctx.lineTo(o.x + o.w * 0.7 + 7, o.y - 20);
    ctx.lineTo(o.x + o.w * 0.7 + 14, o.y - 2);
    ctx.fill();
  }
  ctx.restore();
}

// ---------------------------------------------------------------
//  ENVIRONMENT
// ---------------------------------------------------------------
function initClouds() {
  clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({
      x: Math.random() * W,
      y: 30 + Math.random() * 120,
      w: 50 + Math.random() * 80,
      speed: 0.25 + Math.random() * 0.35
    });
  }
}
initClouds();

function drawBackground() {
  if (bgLoaded) {
    // Tile background at native resolution, scrolling horizontally
    const natW = imgBg.naturalWidth;
    const offset = -(groundOffset * 0.5) % natW;
    for (let x = offset - natW; x < W + natW; x += natW) {
      ctx.drawImage(imgBg, x, 0);
    }
  } else {
    // -- Procedural fallback --
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, '#c8bda0');
    grad.addColorStop(1, '#d4c9a8');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (const c of clouds) {
      ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w / 2, 10, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(c.x - c.w * 0.25, c.y + 4, c.w * 0.3, 7, 0, 0, Math.PI * 2); ctx.fill();
      c.x -= c.speed;
      if (c.x + c.w < 0) { c.x = W + c.w; c.y = 30 + Math.random() * 120; }
    }

    // Far hills
    ctx.fillStyle = 'rgba(139,115,85,0.18)';
    for (let i = 0; i < 5; i++) {
      const hx = ((i * 220 - farGroundOffset * 0.25) % (W + 300)) - 150;
      ctx.beginPath(); ctx.ellipse(hx, GROUND_Y + player.h + 10, 130, 45, 0, Math.PI, Math.PI * 2); ctx.fill();
    }
  }

  // Ground elements (only when no background image -- background.png provides its own ground)
  if (!bgLoaded) {
    const groundLineY = GROUND_Y + player.h;
    ctx.fillStyle = '#b8a88a';
    ctx.fillRect(0, groundLineY + 2, W, H - groundLineY - 2);
    ctx.fillStyle = '#8b7355';
    ctx.fillRect(0, groundLineY, W, 3);

    // Ground texture
    ctx.fillStyle = 'rgba(107,91,69,0.35)';
    for (let i = 0; i < 35; i++) {
      const px = ((i * 47 + 13) - groundOffset) % W;
      const pw = (i % 3 === 0) ? 8 : 3;
      ctx.fillRect(px, groundLineY + 6 + (i % 4) * 3, pw, 1);
    }
  }
}

// ---------------------------------------------------------------
//  PARTICLES
// ---------------------------------------------------------------
function spawnDust(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 14,
      y: y - Math.random() * 4,
      dx: (Math.random() - 0.5) * 2.5,
      dy: -Math.random() * 2 - 0.5,
      life: 14 + Math.random() * 10,
      maxLife: 24,
      color: '#8b7355',
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx; p.y += p.dy; p.dy += 0.05; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---------------------------------------------------------------
//  COLLISION
// ---------------------------------------------------------------
function checkCollision(a, o) {
  const hx = o.x + (o.w - (o.hitW || o.w)) / 2;
  const hy = o.y + (o.h - (o.hitH || o.h)) / 2;
  const hw = o.hitW || o.w;
  const hh = o.hitH || o.h;
  return a.x < hx + hw && a.x + a.w > hx && a.y < hy + hh && a.y + a.h > hy;
}

// ---------------------------------------------------------------
//  GAME LOGIC
// ---------------------------------------------------------------
function resetGame() {
  score = 0;
  speed = 5;
  obstacles = [];
  particles = [];
  player.y = GROUND_Y;
  player.dy = 0;
  player.onGround = true;
  player.ducking = false;
  player.legPhase = 0;
  frameCount = 0;
  spawnCooldown = 70;
  flashTimer = 0;
  shakeTimer = 0;
  gameState = 'running';
  hintEl.textContent = 'Space / Tap to jump -- Down to duck';
}

function die() {
  gameState = 'dead';
  flashTimer = 8;
  shakeTimer = 12;
  spawnDust(player.x + player.w / 2, player.y + player.h, 12);
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('jumpMikeHi', String(hiScore));
  }
}

function update() {
  frameCount++;

  if (gameState === 'running') {
    score = Math.floor(frameCount / 6);
    speed = 5 + score * 0.005;
    if (speed > 14) speed = 14;
    speedEl.textContent = 'SPD ' + speed.toFixed(1);

    groundOffset += speed;
    farGroundOffset += speed;

    player.update();

    spawnCooldown--;
    if (spawnCooldown <= 0) {
      spawnObstacle();
      const range = Math.max(MIN_SPAWN, MAX_SPAWN - score * 0.05);
      spawnCooldown = range * 0.7 + Math.random() * range * 0.6;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= speed;
      if (obstacles[i].x + obstacles[i].w < -20) { obstacles.splice(i, 1); continue; }
      if (checkCollision(player.hitbox, obstacles[i])) die();
    }

    updateParticles();
  } else if (gameState === 'dead') {
    updateParticles();
    if (shakeTimer > 0) {
      shakeTimer--;
      shakeX = (Math.random() - 0.5) * shakeTimer * 0.8;
      shakeY = (Math.random() - 0.5) * shakeTimer * 0.5;
    } else { shakeX = 0; shakeY = 0; }
  }

  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.save();
  if (shakeTimer > 0) ctx.translate(shakeX, shakeY);

  // Death flash
  if (flashTimer > 0) {
    flashTimer--;
    ctx.fillStyle = 'rgba(255,200,150,' + (flashTimer / 8) * 0.5 + ')';
    ctx.fillRect(0, 0, W, H);
  }

  drawBackground();
  for (const o of obstacles) drawObstacle(o);
  player.draw();
  drawParticles();

  // HUD
  scoreEl.textContent = String(score).padStart(5, '0');
  hiScoreEl.textContent = 'HI ' + String(hiScore).padStart(5, '0');

  // ── IDLE SCREEN (gift-photo.jpg splash) ──
  if (gameState === 'idle') {
    // Draw gift photo as cover-fit background, or solid fill if not loaded
    if (giftLoaded) {
      const imgR = imgGift.naturalWidth / imgGift.naturalHeight;
      const canR = W / H;
      let sx, sy, sw, sh;
      if (imgR > canR) {
        sh = imgGift.naturalHeight;
        sw = sh * canR;
        sx = (imgGift.naturalWidth - sw) / 2;
        sy = 0;
      } else {
        sw = imgGift.naturalWidth;
        sh = sw / canR;
        sx = 0;
        sy = (imgGift.naturalHeight - sh) / 2;
      }
      ctx.drawImage(imgGift, sx, sy, sw, sh, 0, 0, W, H);
    } else {
      ctx.fillStyle = '#2d2a24';
      ctx.fillRect(0, 0, W, H);
    }

    // Darken overlay so text is legible
    ctx.fillStyle = 'rgba(30,25,18,0.5)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    // Title
    ctx.fillStyle = '#d4c9a8';
    ctx.font = '700 48px "EB Garamond", Georgia, serif';
    ctx.fillText('Jump Mike', W / 2, H / 2 - 40);

    // "Press Mike to Start" prompt
    const pulse = 0.6 + Math.sin(frameCount * 0.06) * 0.4;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = '400 26px "EB Garamond", Georgia, serif';
    ctx.fillText('Press Mike to Start', W / 2, H / 2 + 14);
    ctx.globalAlpha = 1;

    ctx.font = '400 15px "EB Garamond", Georgia, serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('Space / Tap / Click', W / 2, H / 2 + 50);

    ctx.textAlign = 'left';
    speedEl.textContent = '';
  }

  // ── DEATH SCREEN ──
  if (gameState === 'dead') {
    ctx.fillStyle = 'rgba(30,25,18,0.6)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#c0392b';
    ctx.font = '700 42px "EB Garamond", Georgia, serif';
    ctx.fillText('Game Over', W / 2, H / 2 - 34);

    ctx.fillStyle = '#d4c9a8';
    ctx.font = '400 22px "EB Garamond", Georgia, serif';
    ctx.fillText('Score: ' + score + (score >= hiScore && score > 0 ? '  --  New Record' : ''), W / 2, H / 2 + 6);

    const pulse = 0.5 + Math.sin(frameCount * 0.06) * 0.5;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#a89470';
    ctx.font = '400 18px "EB Garamond", Georgia, serif';
    ctx.fillText('Press Mike to try again', W / 2, H / 2 + 42);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'left';
  }

  ctx.restore();
}

// ---------------------------------------------------------------
//  INPUT
// ---------------------------------------------------------------
let downHeld = false;

function handleAction(action) {
  if (action === 'jump') {
    if (gameState === 'idle' || gameState === 'dead') { resetGame(); return; }
    player.jump();
  }
  if (action === 'duck_start') {
    if (gameState === 'running') player.duck(true);
    downHeld = true;
  }
  if (action === 'duck_end') {
    player.duck(false);
    downHeld = false;
  }
}

// Keyboard
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleAction('jump'); }
  if (e.code === 'ArrowDown') { e.preventDefault(); handleAction('duck_start'); }
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowDown') handleAction('duck_end');
});

// Touch
let touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchStartY = e.touches[0].clientY;
  handleAction('jump');
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches[0].clientY - touchStartY > 30 && !downHeld) handleAction('duck_start');
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (downHeld) handleAction('duck_end');
}, { passive: false });

// Mouse
canvas.addEventListener('mousedown', () => handleAction('jump'));

// ---------------------------------------------------------------
//  UTIL
// ---------------------------------------------------------------
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
